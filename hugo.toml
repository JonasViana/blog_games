baseURL = 'https://focogames.com.br/'
languageCode = 'pt-br'
title = 'Foco Games'
theme = 'PaperMod'
enableRobotsTXT = true
[sitemap]
  changefreq = 'daily'
  priority = 0.5
  filename = 'sitemap.xml'
canonifyURLs = true

[params]
    showFullContents = false
    displayFullPostContent = false
    mainSections = ["posts"]
    defaultTheme = "dark"
    ShowShareButtons = true 
    ShowReadingTime = true
    images = ["/images/logo-focogames.png"] # Imagem padrão caso o post não tenha capa
    label = { text = "Foco Games", icon = "/favicon-32x32.png" }
    assets = { favicon = "/favicon.ico" }

[params.homeInfoParams]
    Title = "Bem-vindo ao Foco Games!"
    Content = "Notícias, Reviews e tudo sobre o mundo dos vídeo games."

[[params.socialIcons]]
    name = "youtube"
    url = "https://youtube.com/@seu-canal" # Coloque seu link real aqui

[[params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/seu-perfil" # Coloque seu link real aqui

[[params.socialIcons]]
    name = "x"
    url = "https://x.com/seu-perfil"

[[params.socialIcons]]
    name = "github"
    url = "https://github.com/JonasViana"

[[menu.main]]
    name = "Notícias"
    url = "/categories/notícias/"
    weight = 10

[[menu.main]]
    name = "Reviews"
    url = "/categories/reviews/"
    weight = 20

[[menu.main]]
    name = "Guias"
    url = "/categories/guias/"
    weight = 30

[[menu.main]]
    name = "Promoções"
    url = "/categories/promocoes/"
    weight = 40

[[menu.main]]
    name = "Sobre"
    url = "/sobre/"
    weight = 50

[[menu.main]]
    name = "Contato"
    url = "/contato/"
    weight = 60