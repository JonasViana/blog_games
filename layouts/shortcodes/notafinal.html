<div style="background-color: #1e1e24; border-left: 5px solid #00ff88; padding: 20px; border-radius: 8px; margin: 30px 0; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);">
    <h3 style="margin-top: 0; color: #00ff88; font-size: 1.5rem; text-transform: uppercase; font-family: sans-serif;">
        🎮 Veredito: {{ .Page.Params.game_title }}
    </h3>
    
    <div style="font-size: 1.1rem; margin-bottom: 10px; color: #e0e0e0;">
        <strong>Nota Final:</strong> 
        <span style="color: #ffcc00; font-weight: bold; font-size: 1.4rem; margin-left: 5px;">
            {{ .Page.Params.rating }}
        </span> 
        <span style="color: #888; font-size: 0.9rem;">/ {{ .Page.Params.best_rating | default "5" }}</span>
    </div>

    <div style="font-size: 0.95rem; color: #aaaaaa; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px;">
        <strong>Desenvolvedora:</strong> {{ .Page.Params.developer }}
    </div>
</div>
